name: render-example-thesis

on:
  push:
    branches: [main, master]
  pull_request:

permissions: read-all

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: quarto install tinytex --no-prompt

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::pdftools, any::quarto, local::.
          needs: check

      - name: Scaffold a fresh example thesis with create_thesis()
        # We deliberately do NOT render the test fixture under
        # tests/testthat/fixtures/ok-std -- that fixture is stripped
        # for static-analysis purposes (CSL file removed, csl: set to
        # the bundled name) and won't render with pandoc. Instead
        # scaffold a fresh, complete project so we exercise the same
        # code path a user would.
        shell: Rscript {0}
        run: |
          library(uomthesis)
          create_thesis(
            path     = "example-thesis",
            format   = "standard",
            degree   = "PhD",
            division = "MSM",
            author   = list(forename = "Jane", middle_initial = "Q",
                            surname = "Doe"),
            title    = "Compliance fixture (standard)",
            year     = 2027,
            open     = FALSE
          )

      - name: Render the example thesis
        run: |
          cd example-thesis
          quarto render --to uomthesis-standard-pdf

      - name: Run source-phase compliance check on the rendered project
        shell: Rscript {0}
        run: |
          library(uomthesis)
          res <- check_thesis(
            project = "example-thesis",
            fail_on = "error"
          )
          stopifnot(res$ok)
          cat("All", res$n_rules, "rules passed.\n")

      - name: Upload rendered PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-thesis-pdf
          path: example-thesis/_book/*.pdf
          if-no-files-found: warn
