title: UoM AMBS Journal-format Thesis
author: Gabriel Cabrera
version: 0.1.0
quarto-required: ">=1.5.0"
contributes:
  formats:
    pdf:
      pdf-engine: lualatex
      documentclass: report
      papersize: a4
      geometry:
        - left=40mm
        - right=15mm
        - top=20mm
        - bottom=20mm
      fontsize: 12pt
      linestretch: 1.5
      mainfont: "Times New Roman"
      number-sections: true
      toc: true
      toc-depth: 3
      lof: true
      lot: true
      template: template.tex
      include-in-header:
        - partials/header.tex
      filters:
        - filters/contribution.lua
      cite-method: citeproc
    html:
      theme: theme/uomthesis.scss
      toc: true
      number-sections: true
      anchor-sections: true
      filters:
        - filters/contribution.lua
