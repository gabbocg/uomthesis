project:
  type: book
  output-dir: _book

book:
  title: "{{title}}"
  chapters:
    - index.qmd
    - chapters/00-abstract.qmd
    - chapters/00-acknowledgements.qmd
    - chapters/01-introduction.qmd
    - chapters/02-paper-one.qmd
    - chapters/03-paper-two.qmd
    - chapters/04-paper-three.qmd
    - chapters/05-discussion.qmd
  appendices:
    - chapters/appendix-a.qmd

format:
  uomthesis-journal-pdf: default
  uomthesis-journal-html: default

bibliography: references.bib
csl: _extensions/uomthesis-journal/csl/{{reference_style}}.csl
